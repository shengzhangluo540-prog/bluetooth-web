<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蓝牙参数配置工具 v2.3</title>
    <style>
        :root {
            --primary: #0a84ff;
            --success: #34c759;
            --warning: #ff9f0a;
            --danger: #ff453a;
            --bg: #f4f7fb;
            --card: #ffffff;
            --border: #d9e2ec;
            --text: #1f2937;
            --muted: #6b7280;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 16px;
            background: linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(217, 226, 236, 0.9);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        }

        h1, h2, h3, p { margin: 0; }

        h2 {
            font-size: 18px;
            margin-bottom: 14px;
        }

        .subtle {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .status-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 14px;
        }

        .status-item {
            background: #f8fbff;
            border-radius: 14px;
            padding: 12px 10px;
            text-align: center;
            border: 1px solid #e6eef8;
        }

        .status-label {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .status-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
        }

        .status-value small {
            font-size: 13px;
            font-weight: 500;
        }

        .status-inline {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #cbd5e1;
        }

        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 0 4px rgba(52, 199, 89, 0.16);
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 7px;
        }

        input,
        select {
            width: 100%;
            min-height: 46px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #fbfdff;
            color: var(--text);
            font-size: 16px;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: rgba(10, 132, 255, 0.55);
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.12);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .filter-chip {
            position: relative;
        }

        .filter-chip input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .filter-chip span {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: #fbfdff;
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            transition: all 0.18s ease;
        }

        .filter-chip input:checked + span {
            background: rgba(10, 132, 255, 0.1);
            border-color: rgba(10, 132, 255, 0.55);
            color: var(--primary);
            box-shadow: 0 6px 16px rgba(10, 132, 255, 0.12);
        }

        .filter-chip input:focus + span {
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.12);
        }

        details {
            margin-top: 12px;
        }

        summary {
            cursor: pointer;
            color: var(--primary);
            font-size: 13px;
            user-select: none;
        }

        button {
            width: 100%;
            min-height: 48px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-top: 10px;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.995);
        }

        .btn-connect { background: var(--primary); }
        .btn-send { background: var(--success); }
        .btn-realtime { background: var(--warning); }
        .btn-disconnect { background: var(--danger); display: none; }
        .btn-clear {
            background: #e5e7eb;
            color: #111827;
            min-height: 40px;
            font-size: 14px;
            font-weight: 600;
        }

        .console {
            background: #0f172a;
            color: #d1fae5;
            border-radius: 14px;
            padding: 12px;
            height: 180px;
            overflow-y: auto;
            font-family: Consolas, Monaco, monospace;
            font-size: 12px;
            line-height: 1.45;
        }

        .console p {
            margin: 0 0 6px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>蓝牙连接</h2>
        <div class="status-inline">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">未连接</span>
        </div>
        <p class="subtle">默认筛选名称以“千山万水”开头的蓝牙设备。</p>

        <details>
            <summary>展开 UUID 设置</summary>
            <div class="form-group" style="margin-top:12px;">
                <label for="serviceUUID">Service UUID</label>
                <input type="text" id="serviceUUID" value="0000ffe0-0000-1000-8000-00805f9b34fb">
            </div>
            <div class="form-group">
                <label for="charUUID">Characteristic UUID</label>
                <input type="text" id="charUUID" value="0000ffe1-0000-1000-8000-00805f9b34fb">
            </div>
        </details>

        <button class="btn-connect" id="btnConnect" onclick="connectBluetooth()">扫描并连接设备</button>
        <button class="btn-disconnect" id="btnDisconnect" onclick="disconnectBluetooth()">断开连接</button>
    </div>

    <div class="card">
        <h2>设备状态</h2>
        <div class="status-row">
            <div class="status-item">
                <div class="status-label">采样频率</div>
                <div class="status-value"><span id="dispFreq">50</span> <small>Hz</small></div>
            </div>
            <div class="status-item">
                <div class="status-label">工作模式</div>
                <div class="status-value" id="dispMode" style="color:#34c759;">实时</div>
            </div>
            <div class="status-item">
                <div class="status-label">滤波模式</div>
                <div class="status-value" id="dispFilter" style="font-size:18px;">不滤波</div>
            </div>
        </div>
        <p class="subtle" style="margin-top:10px; text-align:right;">最后更新：<span id="lastUpdate">等待设备</span></p>
    </div>

    <div class="card">
        <h2>参数配置</h2>
        <div class="form-group">
            <label for="inputDuration">采样时长（秒）</label>
            <input type="number" id="inputDuration" value="10" min="0" max="10" placeholder="最长 10">
        </div>
        <div class="form-group">
            <label for="inputFreq">采样频率（Hz）</label>
            <input type="number" id="inputFreq" value="100" max="1000" placeholder="例如 100">
        </div>
        <div class="form-group">
            <label for="inputInterval">采样间隔（秒）</label>
            <input type="number" id="inputInterval" value="0" min="0" max="10800" placeholder="最长 10800">
        </div>
        <div class="form-group">
            <label>滤波模式选择</label>
            <div class="filter-grid" id="filterModeGroup">
                <label class="filter-chip">
                    <input type="radio" name="filterModeOption" value="0" checked>
                    <span>不滤波</span>
                </label>
                <label class="filter-chip">
                    <input type="radio" name="filterModeOption" value="1">
                    <span>滑动均值</span>
                </label>
                <label class="filter-chip">
                    <input type="radio" name="filterModeOption" value="2">
                    <span>卡尔曼</span>
                </label>
            </div>
        </div>
        <p class="subtle">上方“滤波模式”显示的是设备当前状态；这里选的是本次准备发送的滤波模式。采样时长最长 10 秒，采样间隔最长 10800 秒（3 小时）。</p>

        <button class="btn-send" onclick="sendConfig()">发送配置数据包</button>
        <button class="btn-realtime" onclick="setRealTimeMode()">配置为实时输出模式</button>
    </div>

    <div class="card">
        <h2>发送日志</h2>
        <div class="console" id="consoleLog">
            <p>[系统] 等待操作...</p>
        </div>
        <button class="btn-clear" onclick="document.getElementById('consoleLog').innerHTML=''">清空日志</button>
    </div>

    <script>
        let bluetoothDevice = null;
        let gattServer = null;
        let writeCharacteristic = null;
        let lastKnownModeValue = 1;
        let pendingFilterMode = 0;
        let deviceFilterMode = 0;

        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const btnConnect = document.getElementById('btnConnect');
        const btnDisconnect = document.getElementById('btnDisconnect');
        const logBox = document.getElementById('consoleLog');
        const filterModeInputs = Array.from(document.querySelectorAll('input[name="filterModeOption"]'));

        function log(msg, type = 'info') {
            const p = document.createElement('p');
            const time = new Date().toLocaleTimeString();
            p.innerText = `[${time}] ${msg}`;
            if (type === 'error') p.style.color = '#fca5a5';
            if (type === 'success') p.style.color = '#86efac';
            if (type === 'warning') p.style.color = '#fde68a';
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function getFilterName(filterMode) {
            if (filterMode === 1) return '滑动均值';
            if (filterMode === 2) return '卡尔曼';
            return '不滤波';
        }

        function getSelectedFilterMode() {
            const checked = document.querySelector('input[name="filterModeOption"]:checked');
            return checked ? parseInt(checked.value, 10) || 0 : 0;
        }

        function setSelectedFilterMode(filterMode) {
            const value = String(filterMode);
            const target = filterModeInputs.find((input) => input.value === value);
            if (target) {
                target.checked = true;
                pendingFilterMode = filterMode;
            }
        }

        function updateModeUi(modeVal) {
            let modeStr = '未知';
            let color = '#9ca3af';

            if (modeVal === 0) {
                modeStr = '空闲';
                color = '#9ca3af';
            } else if (modeVal === 1) {
                modeStr = '实时';
                color = '#34c759';
            } else if (modeVal === 2) {
                modeStr = '周期';
                color = '#0a84ff';
            } else if (modeVal === 3) {
                modeStr = '休眠中';
                color = '#ff9f0a';
            }

            const modeEl = document.getElementById('dispMode');
            modeEl.innerText = modeStr;
            modeEl.style.color = color;
            lastKnownModeValue = modeVal;
        }

        function updateFilterUi(filterMode) {
            const filterName = getFilterName(filterMode);
            document.getElementById('dispFilter').innerText = filterName;
            deviceFilterMode = filterMode;
        }

        async function connectBluetooth() {
            const sUUID = document.getElementById('serviceUUID').value.trim().toLowerCase();
            const cUUID = document.getElementById('charUUID').value.trim().toLowerCase();

            try {
                log('正在请求蓝牙设备...');
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: '千山万水' }],
                    optionalServices: [sUUID]
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);
                log(`已选择设备：${bluetoothDevice.name || '未命名设备'}`);

                gattServer = await bluetoothDevice.gatt.connect();
                const service = await gattServer.getPrimaryService(sUUID);
                writeCharacteristic = await service.getCharacteristic(cUUID);

                try {
                    await writeCharacteristic.startNotifications();
                    writeCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);
                    log('状态通知已开启', 'success');
                } catch (notifyError) {
                    log(`状态通知开启失败：${notifyError}`, 'warning');
                }

                statusText.innerText = `已连接 ${bluetoothDevice.name || ''}`.trim();
                statusDot.classList.add('connected');
                btnConnect.style.display = 'none';
                btnDisconnect.style.display = 'block';
                log('蓝牙连接成功', 'success');
            } catch (error) {
                log(`连接失败：${error}`, 'error');
            }
        }

        function disconnectBluetooth() {
            if (bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected) {
                bluetoothDevice.gatt.disconnect();
            }
        }

        function onDisconnected() {
            statusText.innerText = '已断开';
            statusDot.classList.remove('connected');
            btnConnect.style.display = 'block';
            btnDisconnect.style.display = 'none';
            writeCharacteristic = null;
            log('设备已断开连接', 'warning');

            if (lastKnownModeValue === 3) {
                document.getElementById('dispMode').innerText = '休眠中（连接已断开）';
                document.getElementById('dispMode').style.color = '#ff9f0a';
            }
        }

        function calculateCRC16(buffer) {
            let crc = 0xFFFF;
            for (let i = 0; i < buffer.length; i++) {
                crc ^= buffer[i];
                for (let j = 0; j < 8; j++) {
                    if ((crc & 0x0001) !== 0) {
                        crc >>= 1;
                        crc ^= 0xA001;
                    } else {
                        crc >>= 1;
                    }
                }
            }
            return crc;
        }

        function handleNotifications(event) {
            const value = event.target.value;
            const raw = new Uint8Array(value.buffer, value.byteOffset, value.byteLength);
            const hexString = Array.from(raw).map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
            log(`收到数据：${hexString}`);

            if (raw.length !== 8) {
                log(`状态包长度错误：${raw.length}`, 'warning');
                return;
            }

            const view = new DataView(value.buffer, value.byteOffset, value.byteLength);
            if (view.getUint8(0) === 0xEE && view.getUint8(1) === 0x55) {
                const calcCrc = calculateCRC16(raw.slice(0, 6));
                const recvCrc = view.getUint16(6, true);
                if (calcCrc !== recvCrc) {
                    log(`错误包 CRC 错误：收到 ${recvCrc.toString(16)} 计算 ${calcCrc.toString(16)}`, 'error');
                    return;
                }

                const errCode = view.getUint8(2);
                const errValue = view.getUint16(4, true);
                if (errCode === 1) {
                    log(`设备拒绝配置：采样时长 ${errValue}s 超过 10s`, 'error');
                } else if (errCode === 2) {
                    log(`设备拒绝配置：采样间隔 ${errValue}s 超过 10800s`, 'error');
                } else {
                    log(`设备拒绝配置：未知错误 ${errCode}，值 ${errValue}`, 'error');
                }
                return;
            }

            if (view.getUint8(0) !== 0xAA || view.getUint8(1) !== 0x55) {
                log('状态包包头错误', 'warning');
                return;
            }

            const calcCrc = calculateCRC16(raw.slice(0, 6));
            const recvCrc = view.getUint16(6, true);
            if (calcCrc !== recvCrc) {
                log(`状态包 CRC 错误：收到 ${recvCrc.toString(16)} 计算 ${calcCrc.toString(16)}`, 'error');
                return;
            }

            const freq = view.getUint16(2, true);
            const mode = view.getUint8(4);
            const filterMode = view.getUint8(5);

            document.getElementById('dispFreq').innerText = String(freq);
            updateModeUi(mode);
            updateFilterUi(filterMode);
            document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();
        }

        async function sendConfig() {
            if (!writeCharacteristic) {
                alert('请先连接蓝牙设备');
                return;
            }

            const duration = parseInt(document.getElementById('inputDuration').value, 10) || 0;
            let freq = parseInt(document.getElementById('inputFreq').value, 10) || 0;
            const interval = parseInt(document.getElementById('inputInterval').value, 10) || 0;
            const filterMode = getSelectedFilterMode();

            if (duration > 10) {
                log(`发送失败：采样时长 ${duration}s 超过 10s`, 'error');
                alert('采样时长最长 10 秒');
                return;
            }

            if (interval > 10800) {
                log(`发送失败：采样间隔 ${interval}s 超过 10800s（3小时）`, 'error');
                alert('采样间隔最长 10800 秒（3小时）');
                return;
            }

            if (freq > 1000) {
                freq = 1000;
                document.getElementById('inputFreq').value = '1000';
                log('频率超过 1000Hz，已自动钳位到 1000Hz', 'warning');
            }

            const buffer = new ArrayBuffer(11);
            const view = new DataView(buffer);
            view.setUint8(0, 0xA5);
            view.setUint8(1, 0x5A);
            view.setUint16(2, duration, true);
            view.setUint16(4, freq, true);
            view.setUint16(6, interval, true);
            view.setUint8(8, filterMode);

            const crc = calculateCRC16(new Uint8Array(buffer.slice(0, 9)));
            view.setUint16(9, crc, true);

            try {
                await writeCharacteristic.writeValue(buffer);
                const hexString = Array.from(new Uint8Array(buffer)).map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
                log(`发送成功：${hexString}`, 'success');
                log(`解析：时长=${duration}s 频率=${freq}Hz 间隔=${interval}s 滤波=${getFilterName(filterMode)}`);
                updateModeUi(interval === 0 ? 1 : 2);
            } catch (error) {
                log(`发送失败：${error}`, 'error');
            }
        }

        function setRealTimeMode() {
            document.getElementById('inputDuration').value = '10';
            document.getElementById('inputInterval').value = '0';
            sendConfig();
            log('已切换到实时输出模式模板', 'warning');
        }

        if (!navigator.bluetooth) {
            log('当前浏览器不支持 Web Bluetooth', 'error');
            btnConnect.disabled = true;
            btnConnect.innerText = '当前浏览器不支持蓝牙';
        }

        filterModeInputs.forEach((input) => {
            input.addEventListener('change', () => {
                pendingFilterMode = getSelectedFilterMode();
                log(`已选择待发送滤波模式：${getFilterName(pendingFilterMode)}，当前设备仍是：${getFilterName(deviceFilterMode)}`);
            });
        });

        setSelectedFilterMode(0);
    </script>
</body>
</html>
